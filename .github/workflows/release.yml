name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: lolobored
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=lolobored/team-management-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Sanitize platform name
        run: echo "PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ env.PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: lolobored
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: one arg per digest
          docker buildx imagetools create \
            -t lolobored/team-management-${{ matrix.image }}:${{ github.ref_name }} \
            -t lolobored/team-management-${{ matrix.image }}:latest \
            $(printf 'lolobored/team-management-${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect lolobored/team-management-${{ matrix.image }}:${{ github.ref_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Docker images (multi-arch: linux/amd64 + linux/arm64)
            ```
            docker pull lolobored/team-management-backend:${{ github.ref_name }}
            docker pull lolobored/team-management-frontend:${{ github.ref_name }}
            ```
            See Docker Hub: [backend](https://hub.docker.com/r/lolobored/team-management-backend) · [frontend](https://hub.docker.com/r/lolobored/team-management-frontend).
