databaseChangeLog:
  - changeSet:
      id: 15a
      author: laurent
      comment: "Create users table for authentication and RBAC"
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints: { nullable: false, unique: true }
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints: { nullable: false }
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints: { nullable: false }
              - column:
                  name: must_change_password
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints: { nullable: false }
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
